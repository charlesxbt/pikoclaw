<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 100" width="390" height="100">
  <defs>
    <!-- Bright claw gradient: yellow → vivid orange -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff176"/>
      <stop offset="40%"  stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e64a00"/>
    </linearGradient>
    <!-- Icon bg: vivid orange-to-amber -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#ffab00"/>
    </linearGradient>
    <!-- Glow for claw marks -->
    <filter id="glowFX" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1   0.8 0 0 0 0.4   0 0 0 0 0   0 0 0 0.9 0"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow for CLAW text -->
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 1   0.5 0 0 0 0.3   0 0 0 0 0   0 0 0 0.7 0"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect width="100" height="100" rx="20"/>
    </clipPath>
  </defs>

  <!-- ── ICON BLOCK ── -->
  <rect width="100" height="100" rx="20" fill="url(#iconBg)"/>
  <g clip-path="url(#iconClip)">
    <!-- Bright top highlight -->
    <rect width="100" height="4" fill="#ffffff" opacity="0.35"/>
    <!-- Shine overlay -->
    <ellipse cx="50" cy="30" rx="45" ry="28" fill="#ffffff" opacity="0.12"/>
    <!-- LEFT claw -->
    <path d="M 19,15 L 31,15 C 34,38 27,68 23,90 C 19,68 13,38 19,15 Z"
          fill="url(#clawGrad)" filter="url(#glowFX)"/>
    <!-- CENTER claw -->
    <path d="M 44,8 L 57,8 C 61,28 55,72 50,96 C 45,72 39,28 44,8 Z"
          fill="url(#clawGrad)" filter="url(#glowFX)"/>
    <!-- RIGHT claw -->
    <path d="M 69,15 L 81,15 C 87,38 82,68 78,90 C 74,68 67,38 69,15 Z"
          fill="url(#clawGrad)" filter="url(#glowFX)"/>
    <!-- Bottom shadow inner -->
    <rect y="88" width="100" height="12" fill="#c43b00" opacity="0.25"/>
  </g>

  <!-- ── WORDMARK ── -->
  <!-- PIKO — deep charcoal, bold -->
  <text x="118" y="66"
        font-family="'Arial Black', Impact, sans-serif"
        font-size="54" font-weight="900"
        fill="#1a1a2e"
        letter-spacing="-1">PIKO</text>

  <!-- CLAW — vivid orange with glow -->
  <text x="243" y="66"
        font-family="'Arial Black', Impact, sans-serif"
        font-size="54" font-weight="900"
        fill="#ff6d00"
        filter="url(#textGlow)"
        letter-spacing="-1">CLAW</text>

  <!-- Accent underline for CLAW -->
  <line x1="243" y1="72" x2="388" y2="72"
        stroke="#ff9800" stroke-width="3"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Tagline -->
  <text x="118" y="87"
        font-family="'Courier New', monospace"
        font-size="10"
        fill="#555577"
        letter-spacing="2.2">AI AGENT SKILLS · USDC ON BASE</text>

  <!-- x402 badge -->
  <rect x="118" y="91" width="38" height="11" rx="3"
        fill="#ff6d00" opacity="0.15"/>
  <text x="121" y="99.5"
        font-family="'Courier New', monospace"
        font-size="8" font-weight="700"
        fill="#ff6d00"
        letter-spacing="1">x402</text>

  <!-- Dot separator -->
  <circle cx="163" cy="97" r="1.5" fill="#aaa" opacity="0.8"/>

  <!-- OPEN SOURCE -->
  <text x="168" y="100"
        font-family="'Courier New', monospace"
        font-size="8"
        fill="#888899"
        letter-spacing="1">OPEN SOURCE</text>
</svg>
